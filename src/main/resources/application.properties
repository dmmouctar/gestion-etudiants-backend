# ================================================================
#  APPLICATION
# ================================================================
spring.application.name=gestion-etudiants
server.port=8080

# ================================================================
#  BASE DE DONNÉES MySQL
# ================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_etudiant?useSSL=false&serverTimezone=Africa/Abidjan&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de connexions HikariCP (inclus dans Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ================================================================
#  JPA / HIBERNATE
# ================================================================
# validate = vérifie que les entités correspondent aux tables
# (on ne laisse pas Hibernate modifier notre schéma SQL)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ================================================================
#  JWT
# ================================================================
# Clé secrète HS256 - CHANGEZ-LA en production (min 32 caractères)
app.jwt.secret=GestionEtudiant2025SecretKeyPourJWTdoitEtreLongue!
# Durée de validité du token : 24h (en millisecondes)
app.jwt.expiration=86400000

# ================================================================
#  CORS (autorise React sur le port 3000)
# ================================================================
app.cors.allowed-origins=http://localhost:3000

# ================================================================
#  LOGS
# ================================================================
logging.level.com.school=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
